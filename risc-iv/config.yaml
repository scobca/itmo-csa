# Execution limits
limit: 2000                               # Maximum instructions to execute
memory_size: 0x1000                       # Memory size in bytes

# I/O configuration
memory_mapped_io:
  0x80: [ "Hello, world!\n" ]              # Input values at address 0x80
  0x84: [ ]                               # Output-only port at address 0x84

# Reports configuration
reports:
  - name: Step-by-step
    slice: all
    view: |
      {pc}: {instruction} {pc:label}

  - name: Result
    slice: last
    view: |
      numio[0x80]: {io:0x80:hex}
      numio[0x84]: {io:0x84:hex}
    assert: |
      numio[0x80]: [] >>> []
      numio[0x84]: [] >>> [0x00000048,0x00000045,0x0000004c,0x0000004c,0x0000004f,0x0000002c,0x00000020,0x00000057,0x0000004f,0x00000052,0x0000004c,0x00000044,0x00000021]