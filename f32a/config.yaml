# Execution limits
limit: 1000             # Maximum instructions to execute
memory_size: 0x1000       # Memory size in bytes

# I/O configuration
memory_mapped_io:
  0x80: [ 123 ]           # Input values at address 0x80
  0x84: [ ]             # Output-only port at address 0x84

# Reports configuration
reports:
  - name: Step-by-step
    slice: all
    view: |
      {pc}: {instruction} {pc:label}

  - name: Debug
    slice: all
    view: |
      ————————————————————————————————— 
      {pc}: instruction: {instruction} 
      label: {pc:label} 
      A: {A:dec} (dec), {A:hex} (hex)
      B: {B:dec} (dec), {B:hex} (hex)
      ======= Stack =======
      (dec): {stack:dec}
      (hex): {stack:hex}
      ==== Return Stack ====
      (hex): {rstack:dec}
      (dec): {rstack:hex}
      ————————————————————————————————— 

  - name: Result
    slice: last
    view: |
      numio[0x80]: {io:0x80}
      numio[0x84]: {io:0x84}
    assert: |
      numio[0x80]: [] >>> []
      numio[0x84]: [] >>> []